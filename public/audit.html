<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DrawThings 审计日志</title>
    <meta name="description" content="DrawThings 生成任务、提示词、参考图和结果图审计控制台。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@500;700;800&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="audit-body">
    <a class="skip-link" id="skip-link" href="#login-form">跳到登录表单</a>

    <div class="audit-shell">
      <header class="topbar audit-topbar reveal reveal--1">
        <div class="topbar__bezel">
          <div class="topbar__core">
            <a class="brand brand--link" href="/" aria-label="返回生图工作台">
              <span class="brand-mark" aria-hidden="true"></span>
              <span class="brand__text">
                <span class="brand__wordmark">DrawThings</span>
                <span class="brand__tag">审计控制台</span>
              </span>
            </a>
            <nav class="topbar-actions" aria-label="工作台切换">
              <a class="chip-button chip-button--ghost" href="/">
                <span>生图</span>
              </a>
              <a class="chip-button chip-button--ghost" href="/edit.html">
                <span>改图</span>
              </a>
              <a class="chip-button chip-button--active" href="/audit.html" aria-current="page">
                <span class="chip-button__dot" aria-hidden="true"></span>
                <span>审计</span>
              </a>
            </nav>
          </div>
        </div>
      </header>

      <main class="audit-console">
        <section class="audit-login reveal reveal--2" id="login-panel">
          <form id="login-form" class="audit-login__card" novalidate>
            <div class="audit-login__head">
              <span class="eyebrow eyebrow--muted">访问验证</span>
              <h2>管理员登录</h2>
            </div>
            <label class="audit-field">
              <span>管理员密码</span>
              <input id="admin-password" type="password" placeholder="输入 ADMIN_PASSWORD" autocomplete="current-password" aria-describedby="login-status" required />
            </label>
            <button class="primary-button audit-login__submit" type="submit">
              <span class="primary-button__label">进入审计台</span>
              <span class="primary-button__trail" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
              </span>
            </button>
            <div class="audit-status" id="login-status" aria-live="polite"></div>
          </form>
        </section>

        <section class="audit-board reveal reveal--2 hidden" id="audit-panel">
          <div class="audit-board__hero">
            <div>
              <span class="eyebrow eyebrow--accent">Audit Trail</span>
              <h1>审计日志</h1>
              <p id="audit-updated">等待加载</p>
            </div>
            <div class="audit-board__actions">
              <button class="chip-button" type="button" id="refresh-audit">
                <span class="chip-button__dot" aria-hidden="true"></span>
                <span>刷新</span>
              </button>
              <button class="chip-button chip-button--ghost" type="button" id="logout">
                <span>退出</span>
              </button>
            </div>
          </div>

          <div class="audit-summary" id="audit-summary" aria-label="审计摘要"></div>

          <div class="audit-toolbar">
            <label class="audit-search" for="audit-search">
              <span class="visually-hidden">搜索审计日志</span>
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
              <input id="audit-search" type="search" placeholder="搜索任务、模型、风格或提示词" />
            </label>
            <label class="audit-filter" for="audit-status-filter">
              <span>状态</span>
              <select id="audit-status-filter">
                <option value="all">全部</option>
                <option value="completed">完成</option>
                <option value="error">错误</option>
                <option value="pending">进行中</option>
              </select>
            </label>
          </div>

          <div class="audit-list" id="audit-list"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/js/audit/index.js"></script>
  </body>
</html>
